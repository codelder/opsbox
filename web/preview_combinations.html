<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpsBoard Icon Combinations</title>
    <style>
      body {
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 2rem;
        background-color: #f8fafc;
        color: #0f172a;
      }
      .container {
        background: white;
        padding: 2rem;
        border-radius: 1rem;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        width: 100%;
        max-width: 1200px;
        overflow-x: auto;
      }
      h1 {
        text-align: center;
        margin-bottom: 2rem;
        color: #1e293b;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th,
      td {
        padding: 1.5rem;
        text-align: center;
        border: 1px solid #e2e8f0;
      }
      th {
        background: #f1f5f9;
        font-weight: 600;
        color: #475569;
      }
      .row-header {
        text-align: right;
        padding-right: 1rem;
        width: 120px;
      }
      .icon-combo {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.5rem 1rem;
        border-radius: 0.5rem;
        background: #fff;
        border: 1px solid #e2e8f0;
      }
      .icon-combo:hover {
        background: #f8fafc;
        border-color: #cbd5e1;
      }
      .arrow {
        color: #94a3b8;
      }

      /* Colors */
      .source-agent {
        color: #2563eb;
      }
      .source-s3 {
        color: #ea580c;
      }
      .source-local {
        color: #059669;
      }

      .target-tar {
        color: #7c3aed;
      }
      .target-zip {
        color: #db2777;
      }
      .target-dir {
        color: #0891b2;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Data Transfer Combinations</h1>

      <table>
        <thead>
          <tr>
            <th>Source \ Target</th>
            <th>Tar</th>
            <th>TarGz</th>
            <th>Gz</th>
            <th>Dir</th>
            <th>Files</th>
          </tr>
        </thead>
        <tbody id="matrix">
          <!-- Generated by JS below for cleaner code -->
        </tbody>
      </table>
    </div>

    <script>
      const sources = [
        {
          id: 'agent',
          name: 'Agent',
          color: 'source-agent',
          icon: `<path d="M12 8V4H8" /><rect width="16" height="12" x="4" y="8" rx="2" /><path d="M2 14h2" /><path d="M20 14h2" /><path d="M15 13v2" /><path d="M9 13v2" />`
        },
        {
          id: 's3',
          name: 'S3',
          color: 'source-s3',
          icon: `<path d="M3 6h18" /><path d="M5 6v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V6" /><path d="M10 6V4a2 2 0 0 1 2-2h0a2 2 0 0 1 2 2v2" /><path d="M12 11v6" /><path d="M9 14l3 3 3-3" />`
        },
        {
          id: 'local',
          name: 'Local',
          color: 'source-local',
          icon: `<rect width="20" height="14" x="2" y="3" rx="2" /><path d="M2 17h20" /><path d="M2 17v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2" /><path d="M12 17v2" />`
        }
      ];

      const targets = [
        {
          id: 'tar',
          name: 'Tar',
          color: 'target-tar',
          icon: `<path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z" /><path d="m3.3 7 8.7 5 8.7-5" /><path d="M12 22V12" />`
        },
        {
          id: 'targz',
          name: 'TarGz',
          color: 'target-tar',
          icon: `<path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z" /><path d="m3.3 7 8.7 5 8.7-5" /><path d="M12 22V12" /><path d="m8 12 4 2.5 4-2.5" />`
        },
        {
          id: 'gz',
          name: 'Gz',
          color: 'target-zip',
          icon: `<path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71" /><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71" />`
        },
        {
          id: 'dir',
          name: 'Dir',
          color: 'target-dir',
          icon: `<path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2Z" />`
        },
        {
          id: 'files',
          name: 'Files',
          color: 'target-dir',
          icon: `<path d="M20 7h-3a2 2 0 0 1-2-2V2" /><path d="M9 18a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h7l4 4v10a2 2 0 0 1-2 2Z" /><path d="M3 7.6v12.8A1.6 1.6 0 0 0 4.6 22h9.8" />`
        }
      ];

      const arrowIcon = `<path d="M5 12h14" /><path d="m12 5 7 7-7 7" />`;

      const tbody = document.getElementById('matrix');

      sources.forEach((source) => {
        const tr = document.createElement('tr');

        // Header cell
        const th = document.createElement('th');
        th.className = 'row-header';
        th.innerHTML = `
                <div style="display:flex; align-items:center; justify-content:flex-end; gap:0.5rem;">
                    <span>${source.name}</span>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="${source.color}">
                        ${source.icon}
                    </svg>
                </div>
            `;
        tr.appendChild(th);

        // Cells
        targets.forEach((target) => {
          const td = document.createElement('td');
          td.innerHTML = `
                    <div class="icon-combo">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="${source.color}">
                            ${source.icon}
                        </svg>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="arrow">
                            ${arrowIcon}
                        </svg>
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="${target.color}">
                            ${target.icon}
                        </svg>
                    </div>
                `;
          tr.appendChild(td);
        });

        tbody.appendChild(tr);
      });
    </script>
  </body>
</html>
