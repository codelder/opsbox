[package]
name = "api-gateway"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "api-gateway"
path = "src/main.rs"

[dependencies]
axum = "0.8.4"
minio = "0.3.0"
tokio = { version = "1.0", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
logsearch = { path = "../logsearch" }
tower-http = { version = "0.6", features = ["fs", "cors"] }
# 中文注释：为跨平台交叉编译启用 OpenSSL 源码内置编译（避免目标系统缺失 OpenSSL 开发包）
openssl = { version = "0.10", features = ["vendored"] }
