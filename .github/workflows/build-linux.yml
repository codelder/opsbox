name: Build Linux

on:
  push:
    branches: [ main ]

env:
  RUST_VERSION: '1.90.0'

jobs:
  build:
    name: Build Linux (musl)
    runs-on: [self-hosted, Linux, x64]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Verify setup-node action
        uses: actions/setup-node@v5
        with:
          node-version: '20'
        continue-on-error: true

      - name: Enable pnpm via corepack
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - name: Restore pnpm cache
        if: ${{ startsWith(runner.name, 'GitHub Actions') }}
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('web/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: Install frontend dependencies
        shell: bash
        run: pnpm --dir web install --frozen-lockfile

      - name: Install Playwright browsers
        shell: bash
        run: pnpm --dir web exec playwright install chromium

      - name: Run frontend tests
        shell: bash
        run: pnpm --dir web test

      - name: Build frontend
        shell: bash
        run: pnpm --dir web build

      - name: Setup Rust toolchain
        id: rust-toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: '1.90.0'

      - name: Install additional targets
        shell: bash
        run: rustup target add x86_64-unknown-linux-musl

      # 缓存策略（仅在 GitHub 托管 runner 上使用）
      - name: Restore build cache
        if: ${{ startsWith(runner.name, 'GitHub Actions') }}
        uses: actions/cache@v4
        with:
          path: backend/target-musl
          key: target-musl-${{ runner.os }}-${{ env.RUST_VERSION }}-${{ hashFiles('backend/Cargo.lock') }}
          restore-keys: |
            target-musl-${{ runner.os }}-${{ env.RUST_VERSION }}-
            target-musl-${{ runner.os }}-

      - name: Run tests
        run: |
          set -euxo pipefail
          # 安装编译工具链和 musl 工具链
          sudo apt-get update -y
          sudo apt-get install -y build-essential musl-tools pkg-config
          
          # 设置编译环境
          export CARGO_TARGET_DIR="${PWD}/backend/target-musl"
          export OPENSSL_STATIC=1
          
          # 运行测试（使用 release 模式，与后续构建共享编译产物）
          cargo test \
            --manifest-path backend/Cargo.toml \
            --target x86_64-unknown-linux-musl \
            --release \
            --all-features

      - name: Run ignored tests (slow)
        run: |
          set -euxo pipefail
          export CARGO_TARGET_DIR="${PWD}/backend/target-musl"
          export OPENSSL_STATIC=1

          # 运行被忽略的测试（性能和安全测试）
          cargo test \
            --manifest-path backend/Cargo.toml \
            --target x86_64-unknown-linux-musl \
            --release \
            --all-features \
            -- --ignored

      - name: Build backend
        run: |
          set -euxo pipefail
          
          # 设置编译环境
          export CARGO_TARGET_DIR="${PWD}/backend/target-musl"
          export OPENSSL_STATIC=1
          
          # 构建 release 版本（利用测试阶段的编译缓存）
          cargo build \
            --manifest-path backend/Cargo.toml \
            -p opsbox-server -p opsbox-agent \
            --target x86_64-unknown-linux-musl \
            --release \
            --locked

      # 只在打标签时打包和上传
      - name: Package opsbox-server artifact
        run: |
          set -eux
          OPSBOX_DIR="dist/opsbox-server-linux-x86_64-musl"
          OPSBOX_BIN="backend/target-musl/x86_64-unknown-linux-musl/release/opsbox-server"
          mkdir -p "$OPSBOX_DIR"
          
          # 显示二进制信息
          echo "Binary size:"
          ls -lh "$OPSBOX_BIN"
          
          # 验证是静态链接
          echo "Binary type:"
          file "$OPSBOX_BIN"
          ldd "$OPSBOX_BIN" || echo "✓ Statically linked"
          
          cp "$OPSBOX_BIN" "$OPSBOX_DIR/"
          
          # 添加版本信息
          echo "${{ github.sha }}" > "$OPSBOX_DIR/VERSION"
          echo "Target: x86_64-unknown-linux-musl" >> "$OPSBOX_DIR/VERSION"
          echo "Built: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$OPSBOX_DIR/VERSION"
          echo "Binary: opsbox-server" >> "$OPSBOX_DIR/VERSION"

      - name: Package opsbox-agent artifact
        run: |
          set -eux
          AGENT_DIR="dist/opsbox-agent-linux-x86_64-musl"
          AGENT_BIN="backend/target-musl/x86_64-unknown-linux-musl/release/opsbox-agent"
          mkdir -p "$AGENT_DIR"
          
          # 显示二进制信息
          echo "Binary size:"
          ls -lh "$AGENT_BIN"
          
          # 验证是静态链接
          echo "Binary type:"
          file "$AGENT_BIN"
          ldd "$AGENT_BIN" || echo "✓ Statically linked"
          
          cp "$AGENT_BIN" "$AGENT_DIR/"
          
          # 添加版本信息
          echo "${{ github.sha }}" > "$AGENT_DIR/VERSION"
          echo "Target: x86_64-unknown-linux-musl" >> "$AGENT_DIR/VERSION"
          echo "Built: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$AGENT_DIR/VERSION"
          echo "Binary: opsbox-agent" >> "$AGENT_DIR/VERSION"

      - name: Upload opsbox-server artifact
        uses: actions/upload-artifact@v4
        with:
          name: opsbox-server-linux-x86_64-musl
          path: dist/opsbox-server-linux-x86_64-musl

      - name: Upload opsbox-agent artifact
        uses: actions/upload-artifact@v4
        with:
          name: opsbox-agent-linux-x86_64-musl
          path: dist/opsbox-agent-linux-x86_64-musl
