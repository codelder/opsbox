name: build-linux-reusable

on:
  workflow_call:

env:
  RUST_VERSION: '1.90.0'

jobs:
  build-linux:
    name: Build Linux (musl)
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Frontend
        uses: ./.github/actions/setup-frontend

      - name: Setup Rust
        id: rust-setup
        uses: ./.github/actions/setup-rust
        with:
          additional-targets: x86_64-unknown-linux-musl

      # 优化的缓存策略
      - name: Restore build cache
        if: ${{ startsWith(runner.name, 'GitHub Actions') }}
        uses: actions/cache/restore@v4
        with:
          path: backend/target-musl
          key: target-musl-${{ runner.os }}-${{ env.RUST_VERSION }}-${{ hashFiles('backend/Cargo.lock') }}
          restore-keys: |
            target-musl-${{ runner.os }}-${{ env.RUST_VERSION }}-
            target-musl-${{ runner.os }}-

      - name: Run tests
        run: |
          set -euxo pipefail
          # 安装 musl 工具链
          sudo apt-get update -y
          sudo apt-get install -y musl-tools pkg-config
          
          # 设置编译环境
          export CARGO_TARGET_DIR="${PWD}/backend/target-musl"
          export OPENSSL_STATIC=1
          
          # 运行测试（使用 release 模式，与后续构建共享编译产物）
          cargo test \
            --manifest-path backend/Cargo.toml \
            --target x86_64-unknown-linux-musl \
            --release \
            --all-features

      - name: Build backend
        run: |
          set -euxo pipefail
          
          # 设置编译环境
          export CARGO_TARGET_DIR="${PWD}/backend/target-musl"
          export OPENSSL_STATIC=1
          
          # 构建 release 版本（利用测试阶段的编译缓存）
          cargo build \
            --manifest-path backend/Cargo.toml \
            -p opsbox-server -p opsbox-agent \
            --target x86_64-unknown-linux-musl \
            --release \
            --locked

      # 清理缓存中的大文件，只保留增量编译需要的文件
      - name: Clean cache before saving
        run: |
          set -x
          TARGET_DIR="backend/target-musl"
          
          # 显示清理前的大小
          echo "Cache size before cleanup:"
          du -sh "$TARGET_DIR" || true
          
          # 删除不需要缓存的文件
          find "$TARGET_DIR" -type f -name "*.rlib" -size +10M -delete || true
          find "$TARGET_DIR" -type f -name "*.rmeta" -delete || true
          find "$TARGET_DIR" -type d -name "examples" -exec rm -rf {} + || true
          find "$TARGET_DIR" -type d -name "incremental" -exec rm -rf {} + || true
          
          # 保留 release 二进制文件（已经复制到 dist 了）
          # 但删除其他大的中间文件
          find "$TARGET_DIR" -type f -size +50M ! -name "opsbox-*" -delete || true
          
          # 显示清理后的大小
          echo "Cache size after cleanup:"
          du -sh "$TARGET_DIR" || true

      # 只在非 tag 构建时保存缓存（tag 构建是一次性的，不需要缓存）
      - name: Save build cache
        if: success() && !startsWith(github.ref, 'refs/tags/') && startsWith(runner.name, 'GitHub Actions')
        continue-on-error: true  # 缓存失败不影响构建成功
        timeout-minutes: 1       # 最多等待 1 分钟
        uses: actions/cache/save@v4
        with:
          path: backend/target-musl
          key: target-musl-${{ runner.os }}-${{ env.RUST_VERSION }}-${{ hashFiles('backend/Cargo.lock') }}-${{ github.run_id }}

      - name: Package opsbox-server artifact
        run: |
          set -eux
          OPSBOX_DIR="dist/opsbox-server-linux-x86_64-musl"
          OPSBOX_BIN="backend/target-musl/x86_64-unknown-linux-musl/release/opsbox-server"
          mkdir -p "$OPSBOX_DIR"
          
          # 显示二进制信息
          echo "Binary size:"
          ls -lh "$OPSBOX_BIN"
          
          # 验证是静态链接
          echo "Binary type:"
          file "$OPSBOX_BIN"
          ldd "$OPSBOX_BIN" || echo "✓ Statically linked"
          
          cp "$OPSBOX_BIN" "$OPSBOX_DIR/"
          
          # 添加版本信息
          echo "${{ github.sha }}" > "$OPSBOX_DIR/VERSION"
          echo "Target: x86_64-unknown-linux-musl" >> "$OPSBOX_DIR/VERSION"
          echo "Built: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$OPSBOX_DIR/VERSION"
          echo "Binary: opsbox-server" >> "$OPSBOX_DIR/VERSION"

      - name: Package opsbox-agent artifact
        run: |
          set -eux
          AGENT_DIR="dist/opsbox-agent-linux-x86_64-musl"
          AGENT_BIN="backend/target-musl/x86_64-unknown-linux-musl/release/opsbox-agent"
          mkdir -p "$AGENT_DIR"
          
          # 显示二进制信息
          echo "Binary size:"
          ls -lh "$AGENT_BIN"
          
          # 验证是静态链接
          echo "Binary type:"
          file "$AGENT_BIN"
          ldd "$AGENT_BIN" || echo "✓ Statically linked"
          
          cp "$AGENT_BIN" "$AGENT_DIR/"
          
          # 添加版本信息
          echo "${{ github.sha }}" > "$AGENT_DIR/VERSION"
          echo "Target: x86_64-unknown-linux-musl" >> "$AGENT_DIR/VERSION"
          echo "Built: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$AGENT_DIR/VERSION"
          echo "Binary: opsbox-agent" >> "$AGENT_DIR/VERSION"

      - name: Upload opsbox-server artifact
        uses: actions/upload-artifact@v4
        with:
          name: opsbox-server-linux-x86_64-musl
          path: dist/opsbox-server-linux-x86_64-musl

      - name: Upload opsbox-agent artifact
        uses: actions/upload-artifact@v4
        with:
          name: opsbox-agent-linux-x86_64-musl
          path: dist/opsbox-agent-linux-x86_64-musl
