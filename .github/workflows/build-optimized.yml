name: build-optimized

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:

jobs:
  # 质量检查 - 快速失败
  quality-check:
    name: Quality Check
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        
      # 简单检查：确保重要文件存在
      - name: Verify project structure
        run: |
          test -f backend/Cargo.toml || (echo "backend/Cargo.toml not found" && exit 1)
          test -f web/package.json || (echo "web/package.json not found" && exit 1)
          echo "Project structure verified"

  # 平时仅跑 Linux 构建
  build-linux:
    name: Build Linux (Development)
    needs: quality-check
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}
    uses: ./.github/workflows/build-linux.yml

  # 发布版本时的 Linux 构建
  build-linux-release:
    name: Build Linux (Release)
    needs: quality-check
    if: startsWith(github.ref, 'refs/tags/')
    uses: ./.github/workflows/build-linux.yml

  # 发布版本时的其他平台构建
  build-other-platforms:
    name: Build ${{ matrix.config.os }}
    needs: quality-check
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ${{ matrix.config.runner }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - { os: 'macos-x64', runner: 'macos-13', deployment_target: '10.15' }
          - { os: 'macos-arm64', runner: 'macos-14', deployment_target: '11.0' }
          - { os: 'windows', runner: 'windows-2022' }

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Frontend
        uses: ./.github/actions/setup-frontend

      - name: Setup Rust
        id: rust-setup
        uses: ./.github/actions/setup-rust

      # 缓存策略
      - name: Restore build cache
        uses: actions/cache/restore@v4
        with:
          path: backend/target
          key: target-${{ matrix.config.os }}-${{ steps.rust-setup.outputs.cache-key }}-${{ hashFiles('backend/Cargo.lock') }}
          restore-keys: |
            target-${{ matrix.config.os }}-${{ steps.rust-setup.outputs.cache-key }}-
            target-${{ matrix.config.os }}-

      # macOS 构建
      - name: Test and build macOS
        if: startsWith(matrix.config.os, 'macos')
        env:
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.config.deployment_target }}
        run: |
          # 先运行测试
          cargo test --all-features --manifest-path backend/Cargo.toml
          # 然后构建 release 版本
          cargo build --manifest-path backend/Cargo.toml -p opsbox-server -p opsbox-agent --release --locked

      # Windows 构建
      - name: Test and build Windows
        if: matrix.config.os == 'windows'
        run: |
          # 先运行测试
          cargo test --all-features --manifest-path backend/Cargo.toml
          # 然后构建 release 版本
          cargo build --manifest-path backend/Cargo.toml -p opsbox-server -p opsbox-agent --release --locked

      - name: Save build cache
        uses: actions/cache/save@v4
        with:
          path: backend/target
          key: target-${{ matrix.config.os }}-${{ steps.rust-setup.outputs.cache-key }}-${{ hashFiles('backend/Cargo.lock') }}-${{ github.run_id }}

# 打包 opsbox-server artifacts
      - name: Package opsbox-server artifacts
        shell: bash
        run: |
          set -eux
          
          case "${{ matrix.config.os }}" in
            macos-x64)
              mkdir -p dist/opsbox-server-macos-10.15-x86_64
              cp backend/target/release/opsbox-server dist/opsbox-server-macos-10.15-x86_64/
              echo "${{ github.sha }}" > dist/opsbox-server-macos-10.15-x86_64/VERSION
              echo "Target: x86_64-apple-darwin" >> dist/opsbox-server-macos-10.15-x86_64/VERSION
              echo "Built: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> dist/opsbox-server-macos-10.15-x86_64/VERSION
              echo "Binary: opsbox-server" >> dist/opsbox-server-macos-10.15-x86_64/VERSION
              ;;
            macos-arm64)
              mkdir -p dist/opsbox-server-macos-11.0-arm64
              cp backend/target/release/opsbox-server dist/opsbox-server-macos-11.0-arm64/
              echo "${{ github.sha }}" > dist/opsbox-server-macos-11.0-arm64/VERSION
              echo "Target: aarch64-apple-darwin" >> dist/opsbox-server-macos-11.0-arm64/VERSION
              echo "Built: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> dist/opsbox-server-macos-11.0-arm64/VERSION
              echo "Binary: opsbox-server" >> dist/opsbox-server-macos-11.0-arm64/VERSION
              ;;
            windows)
              mkdir -p dist/opsbox-server-windows-x86_64-msvc
              cp backend/target/release/opsbox-server.exe dist/opsbox-server-windows-x86_64-msvc/
              echo "${{ github.sha }}" > dist/opsbox-server-windows-x86_64-msvc/VERSION
              echo "Target: x86_64-pc-windows-msvc" >> dist/opsbox-server-windows-x86_64-msvc/VERSION
              echo "Built: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> dist/opsbox-server-windows-x86_64-msvc/VERSION
              echo "Binary: opsbox-server.exe" >> dist/opsbox-server-windows-x86_64-msvc/VERSION
              ;;
          esac

      # 打包 opsbox-agent artifacts
      - name: Package opsbox-agent artifacts
        shell: bash
        run: |
          set -eux
          
          case "${{ matrix.config.os }}" in
            macos-x64)
              mkdir -p dist/opsbox-agent-macos-10.15-x86_64
              cp backend/target/release/opsbox-agent dist/opsbox-agent-macos-10.15-x86_64/
              echo "${{ github.sha }}" > dist/opsbox-agent-macos-10.15-x86_64/VERSION
              echo "Target: x86_64-apple-darwin" >> dist/opsbox-agent-macos-10.15-x86_64/VERSION
              echo "Built: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> dist/opsbox-agent-macos-10.15-x86_64/VERSION
              echo "Binary: opsbox-agent" >> dist/opsbox-agent-macos-10.15-x86_64/VERSION
              ;;
            macos-arm64)
              mkdir -p dist/opsbox-agent-macos-11.0-arm64
              cp backend/target/release/opsbox-agent dist/opsbox-agent-macos-11.0-arm64/
              echo "${{ github.sha }}" > dist/opsbox-agent-macos-11.0-arm64/VERSION
              echo "Target: aarch64-apple-darwin" >> dist/opsbox-agent-macos-11.0-arm64/VERSION
              echo "Built: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> dist/opsbox-agent-macos-11.0-arm64/VERSION
              echo "Binary: opsbox-agent" >> dist/opsbox-agent-macos-11.0-arm64/VERSION
              ;;
            windows)
              mkdir -p dist/opsbox-agent-windows-x86_64-msvc
              cp backend/target/release/opsbox-agent.exe dist/opsbox-agent-windows-x86_64-msvc/
              echo "${{ github.sha }}" > dist/opsbox-agent-windows-x86_64-msvc/VERSION
              echo "Target: x86_64-pc-windows-msvc" >> dist/opsbox-agent-windows-x86_64-msvc/VERSION
              echo "Built: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> dist/opsbox-agent-windows-x86_64-msvc/VERSION
              echo "Binary: opsbox-agent.exe" >> dist/opsbox-agent-windows-x86_64-msvc/VERSION
              ;;
          esac

      # 上传 opsbox-server artifacts
      - name: Upload opsbox-server macOS x64 artifact
        if: matrix.config.os == 'macos-x64'
        uses: actions/upload-artifact@v4
        with:
          name: opsbox-server-macos-10.15-x86_64
          path: dist/opsbox-server-macos-10.15-x86_64

      - name: Upload opsbox-server macOS arm64 artifact
        if: matrix.config.os == 'macos-arm64'
        uses: actions/upload-artifact@v4
        with:
          name: opsbox-server-macos-11.0-arm64
          path: dist/opsbox-server-macos-11.0-arm64

      - name: Upload opsbox-server Windows artifact
        if: matrix.config.os == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: opsbox-server-windows-x86_64-msvc
          path: dist/opsbox-server-windows-x86_64-msvc

      # 上传 opsbox-agent artifacts
      - name: Upload opsbox-agent macOS x64 artifact
        if: matrix.config.os == 'macos-x64'
        uses: actions/upload-artifact@v4
        with:
          name: opsbox-agent-macos-10.15-x86_64
          path: dist/opsbox-agent-macos-10.15-x86_64

      - name: Upload opsbox-agent macOS arm64 artifact
        if: matrix.config.os == 'macos-arm64'
        uses: actions/upload-artifact@v4
        with:
          name: opsbox-agent-macos-11.0-arm64
          path: dist/opsbox-agent-macos-11.0-arm64

      - name: Upload opsbox-agent Windows artifact
        if: matrix.config.os == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: opsbox-agent-windows-x86_64-msvc
          path: dist/opsbox-agent-windows-x86_64-msvc
  # macOS Universal2 二进制
  macos-universal2-opsbox-server:
    name: macOS Universal2 opsbox-server
    needs: build-other-platforms
    runs-on: macos-13
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download opsbox-server macOS x86_64 artifact
        uses: actions/download-artifact@v5
        with:
          name: opsbox-server-macos-10.15-x86_64
          path: arch_x64

      - name: Download opsbox-server macOS arm64 artifact
        uses: actions/download-artifact@v5
        with:
          name: opsbox-server-macos-11.0-arm64
          path: arch_arm64

      - name: Create opsbox-server universal2 binary
        run: |
          set -euxo pipefail
          OUT_DIR="dist/opsbox-server-macos-universal2"
          mkdir -p "$OUT_DIR"
          
          X64_BIN=$(find arch_x64 -type f -name opsbox-server | head -n1)
          ARM_BIN=$(find arch_arm64 -type f -name opsbox-server | head -n1)
          
          if [ -z "$X64_BIN" ] || [ -z "$ARM_BIN" ]; then
            echo "未找到需要合并的opsbox-server二进制文件" >&2
            exit 1
          fi
          
          lipo -create -output "$OUT_DIR/opsbox-server" "$X64_BIN" "$ARM_BIN"
          
          # 添加版本信息
          echo "${{ github.sha }}" > "$OUT_DIR/VERSION"
          echo "Target: universal2-apple-darwin" >> "$OUT_DIR/VERSION"
          echo "Built: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$OUT_DIR/VERSION"
          echo "Binary: opsbox-server (universal2)" >> "$OUT_DIR/VERSION"

      - name: Upload opsbox-server universal2 artifact
        uses: actions/upload-artifact@v4
        with:
          name: opsbox-server-macos-universal2
          path: dist/opsbox-server-macos-universal2

  # macOS Universal2 opsbox-agent
  macos-universal2-agent:
    name: macOS Universal2 opsbox-agent
    needs: build-other-platforms
    runs-on: macos-13
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download opsbox-agent macOS x86_64 artifact
        uses: actions/download-artifact@v5
        with:
          name: opsbox-agent-macos-10.15-x86_64
          path: arch_x64

      - name: Download opsbox-agent macOS arm64 artifact
        uses: actions/download-artifact@v5
        with:
          name: opsbox-agent-macos-11.0-arm64
          path: arch_arm64

      - name: Create opsbox-agent universal2 binary
        run: |
          set -euxo pipefail
          OUT_DIR="dist/opsbox-agent-macos-universal2"
          mkdir -p "$OUT_DIR"
          
          X64_BIN=$(find arch_x64 -type f -name opsbox-agent | head -n1)
          ARM_BIN=$(find arch_arm64 -type f -name opsbox-agent | head -n1)
          
          if [ -z "$X64_BIN" ] || [ -z "$ARM_BIN" ]; then
            echo "未找到需要合并的opsbox-agent二进制文件" >&2
            exit 1
          fi
          
          lipo -create -output "$OUT_DIR/opsbox-agent" "$X64_BIN" "$ARM_BIN"
          
          # 添加版本信息
          echo "${{ github.sha }}" > "$OUT_DIR/VERSION"
          echo "Target: universal2-apple-darwin" >> "$OUT_DIR/VERSION"
          echo "Built: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$OUT_DIR/VERSION"
          echo "Binary: opsbox-agent (universal2)" >> "$OUT_DIR/VERSION"

      - name: Upload opsbox-agent universal2 artifact
        uses: actions/upload-artifact@v4
        with:
          name: opsbox-agent-macos-universal2
          path: dist/opsbox-agent-macos-universal2

  # 发布
  release:
    name: Release
    needs: [build-linux-release, build-other-platforms, macos-universal2-opsbox-server, macos-universal2-agent]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: opsbox-*
          path: artifacts

      - name: List downloaded artifacts
        run: |
          echo "Downloaded artifacts:"
          ls -lR artifacts/

      - name: Prepare release files
        run: |
          mkdir -p release-files
          
          # 为每个 artifact 创建 tar.gz 包
          for dir in artifacts/*/; do
            if [ -d "$dir" ]; then
              artifact_name=$(basename "$dir")
              echo "Packaging $artifact_name..."
              tar -czf "release-files/${artifact_name}.tar.gz" -C "$dir" .
            fi
          done
          
          echo "Release files:"
          ls -lh release-files/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/*.tar.gz
          prerelease: true
          generate_release_notes: true
          body: |
            ## opsbox v${{ github.ref_name }}
            
            ### 下载
            
            #### Linux (推荐 - 通用静态链接)
            - [opsbox-server-linux-x86_64-musl.tar.gz](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/opsbox-server-linux-x86_64-musl.tar.gz)
            - [opsbox-agent-linux-x86_64-musl.tar.gz](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/opsbox-agent-linux-x86_64-musl.tar.gz)
            
            #### macOS
            - [opsbox-server-macos-universal2.tar.gz](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/opsbox-server-macos-universal2.tar.gz) (Intel + Apple Silicon)
            - [opsbox-agent-macos-universal2.tar.gz](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/opsbox-agent-macos-universal2.tar.gz) (Intel + Apple Silicon)
            
            #### Windows
            - [opsbox-server-windows-x86_64-msvc.tar.gz](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/opsbox-server-windows-x86_64-msvc.tar.gz)
            - [opsbox-agent-windows-x86_64-msvc.tar.gz](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/opsbox-agent-windows-x86_64-msvc.tar.gz)
            
            ### 特性
            - ✅ 静态链接（Linux musl）
            - ✅ 通用兼容性
            - ✅ 优化的二进制大小
            - ✅ 完整测试覆盖
