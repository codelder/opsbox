name: Test Coverage

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # 每周一早上运行
    - cron: '0 2 * * 1'
  workflow_dispatch:  # 手动触发

env:
  RUST_VERSION: '1.90.0'

jobs:
  coverage:
    name: Generate Coverage Report
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: llvm-tools-preview

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Install frontend dependencies
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate
          pnpm --dir web install --frozen-lockfile

      - name: Build frontend
        run: pnpm --dir web build

      - name: Generate coverage report
        run: |
          mkdir -p coverage-reports
          cargo tarpaulin \
            --out Html \
            --out Xml \
            --out Lcov \
            --output-dir coverage-reports \
            --all-features \
            --ignore-tests \
            --timeout 300

      - name: Generate coverage summary
        run: |
          echo "## Coverage Summary" >> $GITHUB_STEP_SUMMARY
          if [ -f "coverage-reports/cobertura.xml" ]; then
            echo "Coverage report generated successfully" >> $GITHUB_STEP_SUMMARY
            echo "Download the HTML report from the artifacts" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Coverage report generation failed" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage-reports/

      - name: Upload coverage to Codecov (optional)
        uses: codecov/codecov-action@v3
        if: success()
        with:
          files: coverage-reports/cobertura.xml
          fail_ci_if_error: false

      - name: Check coverage thresholds
        run: |
          # 简化的覆盖率阈值检查
          echo "Coverage thresholds:"
          echo "- Lines: 70%"
          echo "- Functions: 70%"
          echo "- Branches: 60%"
          echo ""
          echo "Note: Detailed threshold checking requires additional tools"
          echo "Consider using cargo-llvm-cov for precise coverage metrics"