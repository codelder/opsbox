name: build-matrix

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:

jobs:
  # 平时仅跑 Linux
  build-linux:
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}
    name: Build (ubuntu-22.04)
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # 提前激活 pnpm，避免 setup-node 在启用 pnpm 缓存时找不到 pnpm
      - name: Prepare pnpm via corepack (pre)
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - name: Setup Node (for frontend)
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Enable pnpm via corepack
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - name: Install frontend deps
        run: pnpm --dir ui install --frozen-lockfile
        env:
          # 中文注释：跳过 Playwright 浏览器下载，加速 CI
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

      - name: Build frontend
        run: pnpm --dir ui build

      - name: Setup Rust toolchain (stable)
        id: rust-toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: '1.90.0'


      # ========================= Linux 专用（最大化兼容） =========================

      - name: Add musl target (Linux)
        if: runner.os == 'Linux'
        run: rustup target add x86_64-unknown-linux-musl


      - name: Add gnu target (Linux)
        if: runner.os == 'Linux'
        run: rustup target add x86_64-unknown-linux-gnu

# 缓存 target-musl 目录（宿主环境）
      - name: Restore target cache (musl)
        if: runner.os == 'Linux'
        uses: actions/cache/restore@v4
        with:
          path: server/target-musl
          key: target-musl-${{ runner.os }}-${{ steps.rust-toolchain.outputs.cachekey }}-${{ hashFiles('server/Cargo.lock') }}
          restore-keys: |
            target-musl-${{ runner.os }}-${{ steps.rust-toolchain.outputs.cachekey }}-
            target-musl-${{ runner.os }}-

      # 缓存 target-gnu 目录（manylinux 容器环境）
      - name: Restore target cache (gnu)
        if: runner.os == 'Linux'
        uses: actions/cache/restore@v4
        with:
          path: server/target-gnu
          key: target-gnu-${{ runner.os }}-${{ steps.rust-toolchain.outputs.cachekey }}-${{ hashFiles('server/Cargo.lock') }}
          restore-keys: |
            target-gnu-${{ runner.os }}-${{ steps.rust-toolchain.outputs.cachekey }}-
            target-gnu-${{ runner.os }}-


      - name: Build backend (Linux, musl static)
        if: runner.os == 'Linux'
        run: |
          set -euxo pipefail
          # 中文注释：安装 sccache（如未安装）并启用
          if ! command -v sccache >/dev/null 2>&1; then
            # 优先使用 apt 安装；若仓库缺包则回退到 GitHub 预编译二进制
            if ! sudo apt-get update -y || ! sudo apt-get install -y sccache; then
              echo "apt 安装 sccache 失败，回退到 GitHub Release 预编译二进制" >&2
              mkdir -p "$PWD/.tools"
              curl -fsSL -o sccache.tgz https://github.com/mozilla/sccache/releases/download/v0.7.6/sccache-v0.7.6-x86_64-unknown-linux-musl.tar.gz
              tar -xzf sccache.tgz -C "$PWD/.tools"
              mv "$PWD/.tools"/sccache-v0.7.6-x86_64-unknown-linux-musl/sccache "$PWD/.tools/sccache" 2>/dev/null || true
              rm -rf sccache.tgz "$PWD/.tools/sccache-v0.7.6-x86_64-unknown-linux-musl" 2>/dev/null || true
              chmod +x "$PWD/.tools/sccache" || true
              export PATH="$PWD/.tools:$PATH"
            fi
          fi
          # 中文注释：安装 musl 交叉工具链
          sudo apt-get update -y
          sudo apt-get install -y musl-tools pkg-config
          # 中文注释：启动 sccache 守护（如未启动）
          sccache --start-server || true
          export RUSTC_WRAPPER=sccache
          export SCCACHE_DIR="$PWD/.sccache"
          export SCCACHE_CACHE_SIZE=2G
          # 中文注释：统一目标目录（musl 专用），避免与 manylinux 宿主产物混用
          export CARGO_TARGET_DIR="$PWD/server/target-musl"
          # 中文注释：让 C/C++ 也走 sccache（使用 musl-gcc）。若存在 musl-g++ 则一并设置。
          if command -v musl-gcc >/dev/null 2>&1; then export CC="sccache musl-gcc"; fi
          if command -v musl-g++ >/dev/null 2>&1; then export CXX="sccache musl-g++"; fi
          # 中文注释：静态 OpenSSL（vendored），避免系统依赖
          export OPENSSL_STATIC=1
          # 中文注释：使用传统 cargo build 进行 musl 静态构建
          cargo build --manifest-path server/Cargo.toml -p api-gateway --target x86_64-unknown-linux-musl --release --locked


      - name: Ensure manylinux2014 image present
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euxo pipefail
          docker pull quay.io/pypa/manylinux2014_x86_64:latest


      - name: Build backend (Linux, gnu glibc 2.17)
        if: runner.os == 'Linux'
        run: |
          set -euxo pipefail
          docker run --rm \
            -e HOST_UID=$(id -u) -e HOST_GID=$(id -g) \
            -v "$PWD":"$PWD" -w "$PWD" quay.io/pypa/manylinux2014_x86_64 bash -lc '
            set -euxo pipefail
            # 中文注释：补齐 OpenSSL 源码构建所需依赖（perl 模块/编译工具链）
            yum -y install curl git xz tar which binutils perl-core make gcc gcc-c++ pkgconfig
            # 中文注释：启用 devtoolset-10，提供较新的 GCC/LD（注意：devtoolset 的 enable 脚本在 set -u 下会触发 MANPATH 未定义报错）
            if [ -f /opt/rh/devtoolset-10/enable ]; then
              set +u
              source /opt/rh/devtoolset-10/enable
              set -u
            fi

            # 中文注释：确保 OpenSSL 构建所需 Perl 模块存在（IPC::Cmd 与 Text::Template）
            # 先尝试从系统包安装，不可用时使用 cpanminus 兜底
            if ! perl -MIPC::Cmd -e 1 2>/dev/null; then
              yum -y install perl-IPC-Cmd || true
            fi
            if ! perl -MText::Template -e 1 2>/dev/null; then
              yum -y install perl-Text-Template || true
            fi
            if ! perl -MIPC::Cmd -MText::Template -e 1 2>/dev/null; then
              curl -sL https://cpanmin.us | perl - App::cpanminus
              cpanm --notest IPC::Cmd Text::Template
            fi

            # 中文注释：统一目标目录（gnu 专用），避免与宿主产物混用
            export CARGO_TARGET_DIR="$PWD/server/target-gnu"

            # 安装 Rust 并加载环境，固定版本与宿主一致
            curl -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain none
            source "$HOME/.cargo/env"
            rustup toolchain install 1.90.0 --profile minimal --no-self-update
            rustup default 1.90.0
            rustc --version --verbose
            cargo --version

            # 显式启用静态 OpenSSL（vendored）
            export OPENSSL_STATIC=1

            cargo build --manifest-path server/Cargo.toml -p api-gateway --target x86_64-unknown-linux-gnu --release --locked

            # 修正构建产物权限，避免宿主权限问题
            chown -R ${HOST_UID:-0}:${HOST_GID:-0} "$PWD/server/target-gnu" || true
          '
          ls -l server/target-gnu/x86_64-unknown-linux-gnu/release/api-gateway || true

      # 保存 target（全部）缓存（使用唯一 key，利用前缀恢复最新一份）
      - name: Save target cache (musl)
        if: runner.os == 'Linux'
        uses: actions/cache/save@v4
        with:
          path: server/target-musl
          key: target-musl-${{ runner.os }}-${{ steps.rust-toolchain.outputs.cachekey }}-${{ hashFiles('server/Cargo.lock') }}-${{ github.run_id }}

      - name: Save target cache (gnu)
        if: runner.os == 'Linux'
        uses: actions/cache/save@v4
        with:
          path: server/target-gnu
          key: target-gnu-${{ runner.os }}-${{ steps.rust-toolchain.outputs.cachekey }}-${{ hashFiles('server/Cargo.lock') }}-${{ github.run_id }}




      - name: Diagnose GLIBC requirements (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euxo pipefail
          # 中文注释：GNU 构建在 manylinux 容器中使用 CARGO_TARGET_DIR=server/target-gnu
          BIN="server/target-gnu/x86_64-unknown-linux-gnu/release/api-gateway"
          [ -f "$BIN" ] || BIN="server/target/x86_64-unknown-linux-gnu/release/api-gateway"
          echo "== DT_NEEDED and version references =="
          objdump -p "$BIN" | sed -n '/Dynamic Section:/,/Version References/p' || true
          echo "== Version needs (readelf -V) =="
          readelf -V "$BIN" || true
          echo "== Distinct GLIBC symbol versions =="
          objdump -T "$BIN" | grep -oE 'GLIBC_[0-9]+(\.[0-9]+)+' | sort -Vu || true
          echo "== Symbols requiring GLIBC_2.29/2.28/2.27 (if any) =="
          objdump -T "$BIN" | grep -E 'GLIBC_2\.29|GLIBC_2\.28|GLIBC_2\.27' || true
          echo "== ldd resolution on runner (for reference) =="
          ldd "$BIN" || true

      - name: Verify GLIBC baseline (<= 2.17) [Linux]
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          # 中文注释：优先检查 target-gnu 目录，回退到默认 target
          BIN="server/target-gnu/x86_64-unknown-linux-gnu/release/api-gateway"
          [ -f "$BIN" ] || BIN="server/target/x86_64-unknown-linux-gnu/release/api-gateway"
          if [ ! -f "$BIN" ]; then
            echo "GNU artifact not found: $BIN" >&2
            exit 1
          fi
          max=$(objdump -T "$BIN" | grep -oE 'GLIBC_[0-9]+(\.[0-9]+)+' | sed 's/^GLIBC_//' | sort -V | tail -1 || true)
          echo "Detected max GLIBC symbol: ${max:-none}"
          if [ -n "${max:-}" ]; then
            top=$(printf '%s\n%s\n' "$max" "2.17" | sort -V | tail -1)
            if [ "$top" != "2.17" ]; then
              echo "Requires newer than GLIBC_2.17 (found GLIBC_$max)" >&2
              exit 1
            fi
          fi

      # ========================= macOS 专用（按架构设置部署目标） =========================
      - name: Build backend (macOS x86_64, 10.15)
        if: runner.os == 'macOS' && runner.arch == 'X64'
        env:
          # 中文注释：Intel 目标设置为 10.15，以便在旧系统上运行
          MACOSX_DEPLOYMENT_TARGET: '10.15'
        run: |
          cargo build --manifest-path server/Cargo.toml -p api-gateway --release --locked

      - name: Build backend (macOS arm64, 11.0)
        if: runner.os == 'macOS' && runner.arch == 'ARM64'
        env:
          # 中文注释：Apple Silicon 最低为 11.0
          MACOSX_DEPLOYMENT_TARGET: '11.0'
        run: |
          cargo build --manifest-path server/Cargo.toml -p api-gateway --release --locked

      # ========================= Windows 专用（MSVC 通用构建） =========================
      - name: Build backend (Windows, MSVC)
        if: runner.os == 'Windows'
        run: |
          cargo build --manifest-path server/Cargo.toml -p api-gateway --release --locked

      # 非 Linux 平台的打包与上传
      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          set -eux
          ART_DIR="dist/api-gateway-windows-x86_64-msvc"
          BIN="server/target/release/api-gateway.exe"
          mkdir -p "$ART_DIR"
          cp "$BIN" "$ART_DIR/"

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: api-gateway-windows-x86_64-msvc
          path: dist/api-gateway-windows-x86_64-msvc

      - name: Package artifact (macOS x86_64)
        if: runner.os == 'macOS' && runner.arch == 'X64'
        shell: bash
        run: |
          set -eux
          ART_DIR="dist/api-gateway-macos-10.15-x86_64"
          BIN="server/target/release/api-gateway"
          mkdir -p "$ART_DIR"
          cp "$BIN" "$ART_DIR/"

      - name: Upload artifact (macOS x86_64)
        if: runner.os == 'macOS' && runner.arch == 'X64'
        uses: actions/upload-artifact@v4
        with:
          name: api-gateway-macos-10.15-x86_64
          path: dist/api-gateway-macos-10.15-x86_64

      - name: Package artifact (macOS arm64)
        if: runner.os == 'macOS' && runner.arch == 'ARM64'
        shell: bash
        run: |
          set -eux
          ART_DIR="dist/api-gateway-macos-11.0-arm64"
          BIN="server/target/release/api-gateway"
          mkdir -p "$ART_DIR"
          cp "$BIN" "$ART_DIR/"

      - name: Upload artifact (macOS arm64)
        if: runner.os == 'macOS' && runner.arch == 'ARM64'
        uses: actions/upload-artifact@v4
        with:
          name: api-gateway-macos-11.0-arm64
          path: dist/api-gateway-macos-11.0-arm64

      # Linux 平台分别打包 musl 与 gnu 两种产物
      - name: Package artifact (Linux, musl)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -eux
          ART_DIR="dist/api-gateway-linux-x86_64-musl"
          BIN="server/target-musl/x86_64-unknown-linux-musl/release/api-gateway"
          [ -f "$BIN" ] || BIN="server/target/x86_64-unknown-linux-musl/release/api-gateway"
          mkdir -p "$ART_DIR"
          cp "$BIN" "$ART_DIR/"

      - name: Upload artifact (Linux, musl)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: api-gateway-linux-x86_64-musl
          path: dist/api-gateway-linux-x86_64-musl

      - name: Package artifact (Linux, gnu)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -eux
          ART_DIR="dist/api-gateway-linux-x86_64-gnu"
          BIN="server/target-gnu/x86_64-unknown-linux-gnu/release/api-gateway"
          [ -f "$BIN" ] || BIN="server/target/x86_64-unknown-linux-gnu/release/api-gateway"
          mkdir -p "$ART_DIR"
          cp "$BIN" "$ART_DIR/"

      - name: Upload artifact (Linux, gnu)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: api-gateway-linux-x86_64-gnu
          path: dist/api-gateway-linux-x86_64-gnu

  # 打 tag 时跑完整矩阵（Linux/macOS/Windows）
  build-matrix:
    if: startsWith(github.ref, 'refs/tags/')
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-13, macos-14, windows-2022]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Prepare pnpm via corepack (pre)
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - name: Setup Node (for frontend)
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Enable pnpm via corepack
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - name: Install frontend deps
        run: pnpm --dir ui install --frozen-lockfile
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

      - name: Build frontend
        run: pnpm --dir ui build

      - name: Setup Rust toolchain (stable)
        id: rust-toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: '1.90.0'


      - name: Add musl target (Linux)
        if: runner.os == 'Linux'
        run: rustup target add x86_64-unknown-linux-musl

      - name: Add gnu target (Linux)
        if: runner.os == 'Linux'
        run: rustup target add x86_64-unknown-linux-gnu

      # 缓存 target（macOS 主机）
      - name: Restore target cache (macOS host)
        if: runner.os == 'macOS'
        uses: actions/cache/restore@v4
        with:
          path: server/target
          key: target-host-${{ runner.os }}-${{ runner.arch }}-${{ steps.rust-toolchain.outputs.cachekey }}-${{ hashFiles('server/Cargo.lock') }}
          restore-keys: |
            target-host-${{ runner.os }}-${{ runner.arch }}-${{ steps.rust-toolchain.outputs.cachekey }}-
            target-host-${{ runner.os }}-${{ runner.arch }}-
            target-host-${{ runner.os }}-

      # 缓存 target（Windows 主机）
      - name: Restore target cache (Windows host)
        if: runner.os == 'Windows'
        uses: actions/cache/restore@v4
        with:
          path: server/target
          key: target-host-${{ runner.os }}-${{ runner.arch }}-${{ steps.rust-toolchain.outputs.cachekey }}-${{ hashFiles('server/Cargo.lock') }}
          restore-keys: |
            target-host-${{ runner.os }}-${{ runner.arch }}-${{ steps.rust-toolchain.outputs.cachekey }}-
            target-host-${{ runner.os }}-${{ runner.arch }}-
            target-host-${{ runner.os }}-

      # 缓存 target-musl 目录（宿主环境）
      - name: Restore target cache (musl)
        if: runner.os == 'Linux'
        uses: actions/cache/restore@v4
        with:
          path: server/target-musl
          key: target-musl-${{ runner.os }}-${{ steps.rust-toolchain.outputs.cachekey }}-${{ hashFiles('server/Cargo.lock') }}
          restore-keys: |
            target-musl-${{ runner.os }}-${{ steps.rust-toolchain.outputs.cachekey }}-
            target-musl-${{ runner.os }}-

      # 缓存 target-gnu 目录（manylinux 容器环境）
      - name: Restore target cache (gnu)
        if: runner.os == 'Linux'
        uses: actions/cache/restore@v4
        with:
          path: server/target-gnu
          key: target-gnu-${{ runner.os }}-${{ steps.rust-toolchain.outputs.cachekey }}-${{ hashFiles('server/Cargo.lock') }}
          restore-keys: |
            target-gnu-${{ runner.os }}-${{ steps.rust-toolchain.outputs.cachekey }}-
            target-gnu-${{ runner.os }}-

      - name: Build backend (Linux, musl static)
        if: runner.os == 'Linux'
        run: |
          set -euxo pipefail
          sudo apt-get update -y
          sudo apt-get install -y musl-tools pkg-config
          # 中文注释：统一目标目录（musl 专用），与非 tag 流程保持一致，便于缓存
          export CARGO_TARGET_DIR="$PWD/server/target-musl"
          cargo build --manifest-path server/Cargo.toml -p api-gateway --target x86_64-unknown-linux-musl --release --locked

      - name: Ensure manylinux2014 image present
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euxo pipefail
          docker pull quay.io/pypa/manylinux2014_x86_64:latest

      - name: Build backend (Linux, gnu glibc 2.17)
        if: runner.os == 'Linux'
        run: |
          set -euxo pipefail
          docker run --rm \
            -e HOST_UID=$(id -u) -e HOST_GID=$(id -g) \
            -v "$PWD":"$PWD" -w "$PWD" quay.io/pypa/manylinux2014_x86_64 bash -lc '
            set -euxo pipefail
            # 中文注释：补齐 OpenSSL 源码构建所需依赖（perl 模块/编译工具链）
            yum -y install curl git xz tar which binutils perl-core make gcc gcc-c++ pkgconfig
            # 中文注释：启用 devtoolset-10，提供较新的 GCC/LD（注意：devtoolset 的 enable 脚本在 set -u 下会触发 MANPATH 未定义报错）
            if [ -f /opt/rh/devtoolset-10/enable ]; then
              set +u
              source /opt/rh/devtoolset-10/enable
              set -u
            fi

            # 中文注释：确保 OpenSSL 构建所需 Perl 模块存在（IPC::Cmd 与 Text::Template）
            # 先尝试从系统包安装，不可用时使用 cpanminus 兜底
            if ! perl -MIPC::Cmd -e 1 2>/dev/null; then
              yum -y install perl-IPC-Cmd || true
            fi
            if ! perl -MText::Template -e 1 2>/dev/null; then
              yum -y install perl-Text-Template || true
            fi
            if ! perl -MIPC::Cmd -MText::Template -e 1 2>/dev/null; then
              curl -sL https://cpanmin.us | perl - App::cpanminus
              cpanm --notest IPC::Cmd Text::Template
            fi

            # 中文注释：统一目标目录（gnu 专用），避免与宿主产物混用
            export CARGO_TARGET_DIR="$PWD/server/target-gnu"

            # 安装 Rust 并加载环境，固定版本与宿主一致
            curl -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain none
            source "$HOME/.cargo/env"
            rustup toolchain install 1.90.0 --profile minimal --no-self-update
            rustup default 1.90.0
            rustc --version --verbose
            cargo --version

            # 显式启用静态 OpenSSL（vendored）
            export OPENSSL_STATIC=1

            cargo build --manifest-path server/Cargo.toml -p api-gateway --target x86_64-unknown-linux-gnu --release --locked

            # 修正构建产物权限，避免宿主权限问题
            chown -R ${HOST_UID:-0}:${HOST_GID:-0} "$PWD/server/target-gnu" || true
          '
          ls -l server/target-gnu/x86_64-unknown-linux-gnu/release/api-gateway || true

      # 保存 target（全部）缓存（使用唯一 key，利用前缀恢复最新一份）
      - name: Save target cache (musl)
        if: runner.os == 'Linux'
        uses: actions/cache/save@v4
        with:
          path: server/target-musl
          key: target-musl-${{ runner.os }}-${{ steps.rust-toolchain.outputs.cachekey }}-${{ hashFiles('server/Cargo.lock') }}-${{ github.run_id }}

      - name: Save target cache (gnu)
        if: runner.os == 'Linux'
        uses: actions/cache/save@v4
        with:
          path: server/target-gnu
          key: target-gnu-${{ runner.os }}-${{ steps.rust-toolchain.outputs.cachekey }}-${{ hashFiles('server/Cargo.lock') }}-${{ github.run_id }}

      - name: Diagnose GLIBC requirements (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euxo pipefail
          BIN="server/target-gnu/x86_64-unknown-linux-gnu/release/api-gateway"
          [ -f "$BIN" ] || BIN="server/target/x86_64-unknown-linux-gnu/release/api-gateway"
          echo "== DT_NEEDED and version references =="
          objdump -p "$BIN" | sed -n '/Dynamic Section:/,/Version References/p' || true
          echo "== Version needs (readelf -V) =="
          readelf -V "$BIN" || true
          echo "== Distinct GLIBC symbol versions =="
          objdump -T "$BIN" | grep -oE 'GLIBC_[0-9]+(\.[0-9]+)+' | sort -Vu || true
          echo "== Symbols requiring GLIBC_2.29/2.28/2.27 (if any) =="
          objdump -T "$BIN" | grep -E 'GLIBC_2\.29|GLIBC_2\.28|GLIBC_2\.27' || true
          echo "== ldd resolution on runner (for reference) =="
          ldd "$BIN" || true

      - name: Verify GLIBC baseline (<= 2.17) [Linux]
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          BIN="server/target-gnu/x86_64-unknown-linux-gnu/release/api-gateway"
          [ -f "$BIN" ] || BIN="server/target/x86_64-unknown-linux-gnu/release/api-gateway"
          if [ ! -f "$BIN" ]; then
            echo "GNU artifact not found: $BIN" >&2
            exit 1
          fi
          max=$(objdump -T "$BIN" | grep -oE 'GLIBC_[0-9]+(\.[0-9]+)+' | sed 's/^GLIBC_//' | sort -V | tail -1 || true)
          echo "Detected max GLIBC symbol: ${max:-none}"
          if [ -n "${max:-}" ]; then
            top=$(printf '%s\n%s\n' "$max" "2.17" | sort -V | tail -1)
            if [ "$top" != "2.17" ]; then
              echo "Requires newer than GLIBC_2.17 (found GLIBC_$max)" >&2
              exit 1
            fi
          fi

      - name: Build backend (macOS x86_64, 10.15)
        if: runner.os == 'macOS' && runner.arch == 'X64'
        env:
          MACOSX_DEPLOYMENT_TARGET: '10.15'
        run: |
          cargo build --manifest-path server/Cargo.toml -p api-gateway --release --locked

      - name: Build backend (macOS arm64, 11.0)
        if: runner.os == 'macOS' && runner.arch == 'ARM64'
        env:
          MACOSX_DEPLOYMENT_TARGET: '11.0'
        run: |
          cargo build --manifest-path server/Cargo.toml -p api-gateway --release --locked

      # 保存 target（macOS 主机）
      - name: Save target cache (macOS host)
        if: runner.os == 'macOS'
        uses: actions/cache/save@v4
        with:
          path: server/target
          key: target-host-${{ runner.os }}-${{ runner.arch }}-${{ steps.rust-toolchain.outputs.cachekey }}-${{ hashFiles('server/Cargo.lock') }}-${{ github.run_id }}

      - name: Build backend (Windows, MSVC)
        if: runner.os == 'Windows'
        run: |
          cargo build --manifest-path server/Cargo.toml -p api-gateway --release --locked

      # 保存 target（Windows 主机）
      - name: Save target cache (Windows host)
        if: runner.os == 'Windows'
        uses: actions/cache/save@v4
        with:
          path: server/target
          key: target-host-${{ runner.os }}-${{ runner.arch }}-${{ steps.rust-toolchain.outputs.cachekey }}-${{ hashFiles('server/Cargo.lock') }}-${{ github.run_id }}

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          set -eux
          ART_DIR="dist/api-gateway-windows-x86_64-msvc"
          BIN="server/target/release/api-gateway.exe"
          mkdir -p "$ART_DIR"
          cp "$BIN" "$ART_DIR/"

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: api-gateway-windows-x86_64-msvc
          path: dist/api-gateway-windows-x86_64-msvc

      - name: Package artifact (macOS x86_64)
        if: runner.os == 'macOS' && runner.arch == 'X64'
        shell: bash
        run: |
          set -eux
          ART_DIR="dist/api-gateway-macos-10.15-x86_64"
          BIN="server/target/release/api-gateway"
          mkdir -p "$ART_DIR"
          cp "$BIN" "$ART_DIR/"

      - name: Upload artifact (macOS x86_64)
        if: runner.os == 'macOS' && runner.arch == 'X64'
        uses: actions/upload-artifact@v4
        with:
          name: api-gateway-macos-10.15-x86_64
          path: dist/api-gateway-macos-10.15-x86_64

      - name: Package artifact (macOS arm64)
        if: runner.os == 'macOS' && runner.arch == 'ARM64'
        shell: bash
        run: |
          set -eux
          ART_DIR="dist/api-gateway-macos-11.0-arm64"
          BIN="server/target/release/api-gateway"
          mkdir -p "$ART_DIR"
          cp "$BIN" "$ART_DIR/"

      - name: Upload artifact (macOS arm64)
        if: runner.os == 'macOS' && runner.arch == 'ARM64'
        uses: actions/upload-artifact@v4
        with:
          name: api-gateway-macos-11.0-arm64
          path: dist/api-gateway-macos-11.0-arm64

      - name: Package artifact (Linux, musl)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -eux
          ART_DIR="dist/api-gateway-linux-x86_64-musl"
          BIN="server/target-musl/x86_64-unknown-linux-musl/release/api-gateway"
          [ -f "$BIN" ] || BIN="server/target/x86_64-unknown-linux-musl/release/api-gateway"
          mkdir -p "$ART_DIR"
          cp "$BIN" "$ART_DIR/"

      - name: Upload artifact (Linux, musl)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: api-gateway-linux-x86_64-musl
          path: dist/api-gateway-linux-x86_64-musl

      - name: Package artifact (Linux, gnu)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -eux
          ART_DIR="dist/api-gateway-linux-x86_64-gnu"
          BIN="server/target-gnu/x86_64-unknown-linux-gnu/release/api-gateway"
          [ -f "$BIN" ] || BIN="server/target/x86_64-unknown-linux-gnu/release/api-gateway"
          mkdir -p "$ART_DIR"
          cp "$BIN" "$ART_DIR/"

      - name: Upload artifact (Linux, gnu)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: api-gateway-linux-x86_64-gnu
          path: dist/api-gateway-linux-x86_64-gnu

  macos-universal2:
    name: Mac universal2
    needs: build-matrix
    runs-on: macos-13
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download macOS x86_64 artifact
        uses: actions/download-artifact@v5
        with:
          name: api-gateway-macos-10.15-x86_64
          path: arch_x64

      - name: Download macOS arm64 artifact
        uses: actions/download-artifact@v5
        env:
          NODE_NO_WARNINGS: '1'
        with:
          name: api-gateway-macos-11.0-arm64
          path: arch_arm64

      - name: Create universal2 binary
        shell: bash
        run: |
          set -euxo pipefail
          OUT_DIR="dist/api-gateway-macos-universal2"
          mkdir -p "$OUT_DIR"
          # 中文注释：下载的工件解压后的结构可能包含或不包含 dist 前缀，此处使用 find 动态查找
          X64_BIN=$(find arch_x64 -type f -name api-gateway | head -n1 || true)
          ARM_BIN=$(find arch_arm64 -type f -name api-gateway | head -n1 || true)
          if [ -z "${X64_BIN:-}" ] || [ -z "${ARM_BIN:-}" ]; then
            echo "未找到需要合并的二进制：X64='${X64_BIN:-}' ARM='${ARM_BIN:-}'" >&2
            echo "目录结构 (前 3 层)：" >&2
            find arch_x64 -maxdepth 3 -type d -print >&2 || true
            find arch_arm64 -maxdepth 3 -type d -print >&2 || true
            exit 1
          fi
          echo "x64 bin: $X64_BIN" >&2
          echo "arm64 bin: $ARM_BIN" >&2
          # 中文注释：合并两种架构的 Mach-O 可执行文件
          lipo -create -output "$OUT_DIR/api-gateway" "$X64_BIN" "$ARM_BIN"

      - name: Upload artifact (macOS universal2)
        uses: actions/upload-artifact@v4
        with:
          name: api-gateway-macos-universal2
          path: dist/api-gateway-macos-universal2

  release:
    name: Release on tag
    needs: [build-matrix, macos-universal2]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: api-gateway-*
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: artifacts/**/*
          prerelease: true
