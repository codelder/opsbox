name: 'Setup Frontend'
description: 'Setup Node.js, pnpm and build frontend'
inputs:
  working-directory:
    description: 'Frontend working directory'
    required: false
    default: 'web'

env:
  NODE_VERSION: '20'

runs:
  using: 'composite'
  steps:
    
    - name: Enable pnpm via corepack 
      shell: bash
      run: |
        corepack enable
        corepack prepare pnpm@latest --activate

    - name: Restore pnpm cache
      if: ${{ startsWith(runner.name, 'GitHub Actions') }}
      uses: actions/cache@v4
      with:
        path: ~/.pnpm-store
        key: pnpm-store-${{ runner.os }}-${{ hashFiles(format('{0}/pnpm-lock.yaml', inputs.working-directory)) }}
        restore-keys: |
          pnpm-store-${{ runner.os }}-

    - name: Install frontend dependencies
      shell: bash
      run: pnpm --dir ${{ inputs.working-directory }} install --frozen-lockfile

    - name: Run frontend tests
      shell: bash
      run: pnpm --dir ${{ inputs.working-directory }} test

    - name: Build frontend
      shell: bash
      run: pnpm --dir ${{ inputs.working-directory }} build
