name: 'Setup Frontend'
description: 'Setup Node.js, pnpm and build frontend'
inputs:
  working-directory:
    description: 'Frontend working directory'
    required: false
    default: 'web'

env:
  NODE_VERSION: '20'

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: ${{ env.NODE_VERSION }}

    - name: Setup pnpm
      shell: bash
      run: |
        # 检查 corepack 是否可用（Node.js 16.9+ 自带）
        if command -v corepack &> /dev/null; then
          echo "Using corepack to enable pnpm"
          corepack enable
          corepack prepare pnpm@latest --activate
        else
          echo "corepack not found, installing pnpm via npm"
          npm install -g pnpm@latest
        fi
        # 验证 pnpm 安装成功
        pnpm --version

    - name: Restore pnpm cache
      if: ${{ runner.environment != 'self-hosted' }}
      uses: actions/cache@v4
      with:
        path: ~/.pnpm-store
        key: pnpm-store-${{ runner.os }}-${{ hashFiles(format('{0}/pnpm-lock.yaml', inputs.working-directory)) }}
        restore-keys: |
          pnpm-store-${{ runner.os }}-

    - name: Install frontend dependencies
      shell: bash
      run: pnpm --dir ${{ inputs.working-directory }} install --frozen-lockfile
      env:
        # 跳过 Playwright 浏览器下载，加速 CI
        PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

    - name: Install Playwright browsers
      shell: bash
      run: pnpm --dir ${{ inputs.working-directory }} exec playwright install --with-deps

    - name: Run frontend tests
      shell: bash
      run: pnpm --dir ${{ inputs.working-directory }} test

    - name: Build frontend
      shell: bash
      run: pnpm --dir ${{ inputs.working-directory }} build
